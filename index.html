<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMES BR COMMUNITY</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #050a05;
            --glass: rgba(0, 255, 65, 0.1);
            --border: rgba(0, 255, 65, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background-color: var(--dark-bg); color: white; overflow-x: hidden; }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; inset: 0; background: black; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; transition: opacity 0.5s ease;
        }
        .glitch-text {
            font-family: 'Orbitron', sans-serif; font-size: 3rem; color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green); margin-bottom: 20px;
        }
        .progress-container { width: 250px; height: 4px; background: #111; border-radius: 10px; position: relative; }
        .progress-bar { 
            width: 0%; height: 100%; background: var(--neon-green); 
            box-shadow: 0 0 15px var(--neon-green); border-radius: 10px;
            animation: loading 5s linear forwards;
        }
        .by-goat { margin-top: 15px; font-size: 0.9rem; color: var(--border); letter-spacing: 2px; }
        @keyframes loading { to { width: 100%; } }

        /* --- AUTH SCREEN --- */
        #auth-screen { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; }
        .auth-card {
            background: var(--glass); border: 1px solid var(--border); padding: 2rem;
            border-radius: 20px; backdrop-filter: blur(10px); width: 90%; max-width: 400px; text-align: center;
        }
        .profile-upload {
            width: 100px; height: 100px; border-radius: 50%; border: 2px dashed var(--neon-green);
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden; position: relative;
        }
        .profile-upload img { width: 100%; height: 100%; object-fit: cover; }
        input, select {
            width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.5);
            border: 1px solid var(--border); color: var(--neon-green); border-radius: 8px; outline: none;
        }
        .btn {
            width: 100%; padding: 12px; background: var(--neon-green); color: black;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; margin-top: 10px;
        }
        .btn:hover { box-shadow: 0 0 20px var(--neon-green); }

        /* --- MAIN CONTENT --- */
        #main-content { display: none; padding-bottom: 50px; }
        header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(5,10,5,0.9); z-index: 100;
        }
        .search-area {
            display: flex; align-items: center; gap: 10px; background: var(--glass);
            padding: 5px 15px; border-radius: 30px; border: 1px solid var(--border); flex: 1; margin: 0 15px;
        }
        .search-area input { border: none; background: transparent; margin: 0; padding: 5px; width: 100%; color: var(--neon-green); }

        /* FEED */
        .feed { padding: 20px; max-width: 600px; margin: 0 auto; }
        .post {
            background: var(--glass); border: 1px solid var(--border); border-radius: 15px;
            margin-bottom: 20px; padding: 15px; animation: slideUp 0.5s ease;
        }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-header img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--neon-green); }
        .post-img { width: 100%; border-radius: 10px; margin: 10px 0; border: 1px solid var(--border); }
        .post-actions { display: flex; gap: 20px; margin-top: 10px; color: var(--neon-green); }
        .post-actions div { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .tag-pill { font-size: 0.7rem; background: var(--neon-green); color: black; padding: 2px 8px; border-radius: 10px; margin-left: 5px; }

        /* MODAIS */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { background: #0a110a; border: 1px solid var(--neon-green); padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
        .comment-item { border-bottom: 1px solid var(--glass); padding: 10px 0; display: flex; gap: 10px; }
        .comment-item img { width: 25px; height: 25px; border-radius: 50%; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .rank-item { display: flex; align-items: center; gap: 15px; padding: 10px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="glitch-text">MEMES<br>BR<br>COMMUNITY</div>
        <div class="progress-container"><div class="progress-bar"></div></div>
        <div class="by-goat">By: Goat</div>
    </div>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="margin-bottom: 20px; color: var(--neon-green);">IDENTIFIQUE-SE</h2>
            <div class="profile-upload" id="profile-trigger">
                <i data-lucide="camera" id="upload-icon"></i>
                <img id="preview-img" style="display:none">
            </div>
            <input type="file" id="input-file" hidden accept="image/*">
            <input type="text" id="username" placeholder="Nome de Usuário">
            <input type="password" id="password" placeholder="Senha">
            <button class="btn" id="btn-auth">Registrar / Login</button>
        </div>
    </div>

    <div id="main-content">
        <header>
            <div id="btn-open-post" style="cursor:pointer"><i data-lucide="plus-square"></i></div>
            <div class="search-area">
                <i data-lucide="search" size="18"></i>
                <input type="text" id="search-input" placeholder="Pesquisar...">
                <i data-lucide="filter" id="filter-btn" size="18" style="cursor:pointer; transition: 0.3s;"></i>
            </div>
            <div style="display:flex; gap: 15px; cursor:pointer">
                <i data-lucide="trophy" id="btn-rank"></i>
                <i data-lucide="shield-check" id="btn-admin"></i>
            </div>
        </header>
        <div class="feed" id="feed-container"></div>
    </div>

    <!-- MODAIS -->
    <div id="post-modal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
                <h3>Nova Postagem</h3>
                <i data-lucide="x" class="close-modal" data-target="post-modal" style="cursor:pointer"></i>
            </div>
            <textarea id="post-text" placeholder="No que está pensando?" style="width:100%; height:80px; background:black; color:white; border:1px solid var(--border); padding:10px; border-radius:10px; outline:none;"></textarea>
            <input type="file" id="post-file">
            <select id="post-tag">
                <option value="geral">Geral</option>
                <option value="meme">Meme</option>
            </select>
            <button class="btn" id="btn-submit-post">POSTAR</button>
        </div>
    </div>

    <div id="comment-modal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
                <h3>Comentários</h3>
                <i data-lucide="x" class="close-modal" data-target="comment-modal" style="cursor:pointer"></i>
            </div>
            <div id="comments-list" style="margin-bottom: 15px;"></div>
            <div style="display:flex; gap: 10px;">
                <input type="text" id="new-comment" placeholder="Escreva um comentário..." style="margin:0;">
                <button class="btn" id="btn-submit-comment" style="width:auto; margin:0;">OK</button>
            </div>
        </div>
    </div>

    <div id="rank-modal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
                <h3>TOP 10 LENDAS</h3>
                <i data-lucide="x" class="close-modal" data-target="rank-modal" style="cursor:pointer"></i>
            </div>
            <div id="rank-list"></div>
        </div>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <h3>PAINEL ADMIN</h3>
            <input type="password" id="admin-code" placeholder="Código: 2012">
            <button class="btn" id="btn-login-admin">ACESSAR</button>
            <div id="admin-tools" style="display:none; margin-top:20px;">
                <p style="color:red">MODO ADMIN ATIVO</p>
                <button class="btn" id="btn-logout-admin" style="background: #333; color:white">SAIR</button>
            </div>
            <button class="btn close-modal" data-target="admin-modal" style="margin-top:10px; background: transparent; color:gray;">Fechar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, setDoc, updateDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5GzJ3Lms_xtd6_9Rru9Bjmc-nCnz4iHM",
            authDomain: "songokuue.firebaseapp.com",
            projectId: "songokuue",
            storageBucket: "songokuue.firebasestorage.app",
            messagingSenderId: "981357296896",
            appId: "1:981357296896:web:5f2bab8092d8e848ea07e5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let users = [];
        let posts = [];
        let currentUser = null;
        let isAdmin = false;
        let memeFilter = false;
        let currentPostId = null;

        // --- INICIALIZAÇÃO ---
        window.addEventListener('load', () => {
            lucide.createIcons();
            
            // Listeners em tempo real
            onSnapshot(collection(db, "users"), (snapshot) => {
                users = snapshot.docs.map(d => d.data());
            });

            const qPosts = query(collection(db, "posts"), orderBy("id", "desc"));
            onSnapshot(qPosts, (snapshot) => {
                posts = snapshot.docs.map(d => ({ fid: d.id, ...d.data() }));
                renderPosts();
            });

            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('auth-screen').style.display = 'flex';
                }, 500);
            }, 5000);
        });

        // --- AUTH LOGIC ---
        const usernameInput = document.getElementById('username');
        const previewImg = document.getElementById('preview-img');
        const uploadIcon = document.getElementById('upload-icon');

        usernameInput.oninput = (e) => {
            const user = users.find(u => u.name === e.target.value);
            if (user) {
                previewImg.src = user.pic;
                previewImg.style.display = 'block';
                uploadIcon.style.display = 'none';
            } else {
                previewImg.style.display = 'none';
                uploadIcon.style.display = 'block';
            }
        };

        document.getElementById('profile-trigger').onclick = () => document.getElementById('input-file').click();
        document.getElementById('input-file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                previewImg.src = reader.result;
                previewImg.style.display = 'block';
                uploadIcon.style.display = 'none';
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('btn-auth').onclick = async () => {
            const name = usernameInput.value;
            const pass = document.getElementById('password').value;
            const pic = previewImg.src;
            if (!name || !pass) return alert('Preencha os dados!');

            let user = users.find(u => u.name === name);
            if (user) {
                if (user.pass !== pass) return alert('Senha incorreta!');
                currentUser = user;
            } else {
                currentUser = { name, pass, pic, likesReceived: 0 };
                await setDoc(doc(db, "users", name), currentUser);
            }
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        };

        // --- POSTS LOGIC ---
        document.getElementById('btn-submit-post').onclick = async () => {
            const text = document.getElementById('post-text').value;
            const tag = document.getElementById('post-tag').value;
            const file = document.getElementById('post-file').files[0];

            let imageData = null;
            if (file) {
                imageData = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = () => r(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            await addDoc(collection(db, "posts"), {
                id: Date.now(),
                author: currentUser.name,
                authorPic: currentUser.pic,
                content: text,
                tag: tag,
                likes: 0,
                likedBy: [],
                comments: [],
                image: imageData
            });

            closeModal('post-modal');
            document.getElementById('post-text').value = '';
            document.getElementById('post-file').value = '';
        };

        function renderPosts() {
            const container = document.getElementById('feed-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = '';

            let filtered = posts.filter(p => p.content.toLowerCase().includes(search));
            if (memeFilter) filtered = filtered.filter(p => p.tag === 'meme');

            filtered.forEach(post => {
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `
                    <div class="post-header">
                        <img src="${post.authorPic}">
                        <div style="flex:1">
                            <span style="font-weight:bold">${post.author}</span>
                            <span class="tag-pill">${post.tag}</span>
                        </div>
                        ${isAdmin ? `<i data-lucide="trash-2" class="del-btn" data-id="${post.fid}" style="color:red; cursor:pointer"></i>` : ''}
                    </div>
                    <p>${post.content}</p>
                    ${post.image ? `<img src="${post.image}" class="post-img">` : ''}
                    <div class="post-actions">
                        <div class="like-btn" data-id="${post.fid}">
                            <i data-lucide="heart" style="${post.likedBy.includes(currentUser.name) ? 'fill:red; color:red' : ''}"></i>
                            <span>${post.likes}</span>
                        </div>
                        <div class="comm-btn" data-id="${post.fid}">
                            <i data-lucide="message-circle"></i>
                            <span>${post.comments.length}</span>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
            attachFeedEvents();
        }

        function attachFeedEvents() {
            document.querySelectorAll('.like-btn').forEach(b => b.onclick = () => handleLike(b.dataset.id));
            document.querySelectorAll('.comm-btn').forEach(b => b.onclick = () => openComments(b.dataset.id));
            document.querySelectorAll('.del-btn').forEach(b => b.onclick = () => deletePost(b.dataset.id));
        }

        async function handleLike(fid) {
            const post = posts.find(p => p.fid === fid);
            let newLikes = post.likes;
            let newLikedBy = [...post.likedBy];
            const isLiking = !newLikedBy.includes(currentUser.name);

            if (isLiking) {
                newLikedBy.push(currentUser.name);
                newLikes++;
            } else {
                newLikedBy = newLikedBy.filter(u => u !== currentUser.name);
                newLikes--;
            }

            await updateDoc(doc(db, "posts", fid), { likes: newLikes, likedBy: newLikedBy });
            
            const authRef = doc(db, "users", post.author);
            const authDoc = await getDoc(authRef);
            if(authDoc.exists()){
                let total = authDoc.data().likesReceived || 0;
                await updateDoc(authRef, { likesReceived: isLiking ? total + 1 : total - 1 });
            }
        }

        // --- COMENTARIOS ---
        function openComments(fid) {
            currentPostId = fid;
            const post = posts.find(p => p.fid === fid);
            const list = document.getElementById('comments-list');
            list.innerHTML = post.comments.length ? '' : '<p style="color:gray">Sem comentários...</p>';
            post.comments.forEach(c => {
                list.innerHTML += `<div class="comment-item"><img src="${c.pic}"><div><p style="font-weight:bold; font-size:0.8rem; color:var(--neon-green)">${c.user}</p><p style="font-size:0.9rem">${c.text}</p></div></div>`;
            });
            openModal('comment-modal');
        }

        document.getElementById('btn-submit-comment').onclick = async () => {
            const input = document.getElementById('new-comment');
            if (!input.value) return;
            const post = posts.find(p => p.fid === currentPostId);
            const newList = [...post.comments, { user: currentUser.name, pic: currentUser.pic, text: input.value }];
            await updateDoc(doc(db, "posts", currentPostId), { comments: newList });
            input.value = '';
            openComments(currentPostId);
        };

        // --- AUXILIARES E UI ---
        document.getElementById('filter-btn').onclick = () => {
            memeFilter = !memeFilter;
            const b = document.getElementById('filter-btn');
            b.style.color = memeFilter ? "white" : "var(--neon-green)";
            b.style.background = memeFilter ? "var(--neon-green)" : "transparent";
            b.style.borderRadius = "50%";
            renderPosts();
        };

        document.getElementById('btn-rank').onclick = () => {
            const list = document.getElementById('rank-list');
            list.innerHTML = '';
            const top = [...users].sort((a,b) => (b.likesReceived || 0) - (a.likesReceived || 0)).slice(0, 10);
            top.forEach((u, i) => {
                list.innerHTML += `<div class="rank-item"><span style="color:var(--neon-green)">#${i+1}</span><img src="${u.pic}" style="width:30px; height:30px; border-radius:50%"><span style="flex:1">${u.name}</span><span>${u.likesReceived || 0} likes</span>${isAdmin ? `<button class="ban-user-btn" data-name="${u.name}" style="background:red; color:white; border:none; padding:2px 5px; border-radius:4px; font-size:10px; cursor:pointer">BAN</button>` : ''}</div>`;
            });
            openModal('rank-modal');
            document.querySelectorAll('.ban-user-btn').forEach(b => b.onclick = () => banUser(b.dataset.name));
        };

        document.getElementById('btn-login-admin').onclick = () => {
            if (document.getElementById('admin-code').value === "2012") {
                isAdmin = true;
                document.getElementById('admin-tools').style.display = 'block';
                renderPosts();
            } else alert('Código incorreto!');
        };

        document.getElementById('btn-logout-admin').onclick = () => {
            isAdmin = false;
            document.getElementById('admin-tools').style.display = 'none';
            renderPosts();
        };

        async function deletePost(fid) { await deleteDoc(doc(db, "posts", fid)); }
        async function banUser(name) {
            if(name === currentUser.name) return;
            await deleteDoc(doc(db, "users", name));
            posts.filter(p => p.author === name).forEach(p => deletePost(p.fid));
            document.getElementById('btn-rank').click();
        }

        // Modais
        document.getElementById('btn-open-post').onclick = () => openModal('post-modal');
        document.getElementById('btn-admin').onclick = () => openModal('admin-modal');
        document.querySelectorAll('.close-modal').forEach(b => b.onclick = () => closeModal(b.dataset.target));

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        document.getElementById('search-input').oninput = renderPosts;

    </script>
</body>
</html>
