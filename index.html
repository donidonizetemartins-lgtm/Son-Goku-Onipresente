<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMES BR COMMUNITY</title>
    
    <!-- Scripts Firebase (Versão Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-storage-compat.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #050a05;
            --glass: rgba(0, 255, 65, 0.1);
            --border: rgba(0, 255, 65, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background-color: var(--dark-bg); color: white; overflow-x: hidden; }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; inset: 0; background: black; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; transition: opacity 0.5s ease;
        }
        .glitch-text {
            font-family: 'Orbitron', sans-serif; font-size: 3rem; color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green); margin-bottom: 20px;
        }
        .progress-container { width: 250px; height: 4px; background: #111; border-radius: 10px; position: relative; }
        .progress-bar { 
            width: 0%; height: 100%; background: var(--neon-green); 
            box-shadow: 0 0 15px var(--neon-green); border-radius: 10px;
            animation: loading 5s linear forwards;
        }
        .by-goat { margin-top: 15px; font-size: 0.9rem; color: var(--border); letter-spacing: 2px; }
        @keyframes loading { to { width: 100%; } }

        /* --- AUTH SCREEN --- */
        #auth-screen { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; }
        .auth-card {
            background: var(--glass); border: 1px solid var(--border); padding: 2rem;
            border-radius: 20px; backdrop-filter: blur(10px); width: 90%; max-width: 400px; text-align: center;
        }
        .profile-upload {
            width: 100px; height: 100px; border-radius: 50%; border: 2px dashed var(--neon-green);
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden; position: relative;
        }
        .profile-upload img { width: 100%; height: 100%; object-fit: cover; }
        input, select {
            width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.5);
            border: 1px solid var(--border); color: var(--neon-green); border-radius: 8px; outline: none;
        }
        .btn {
            width: 100%; padding: 12px; background: var(--neon-green); color: black;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; margin-top: 10px;
        }
        .btn:hover { box-shadow: 0 0 20px var(--neon-green); }

        /* --- MAIN CONTENT --- */
        #main-content { display: none; padding-bottom: 50px; }
        header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(5,10,5,0.9); z-index: 100;
        }
        .search-area {
            display: flex; align-items: center; gap: 10px; background: var(--glass);
            padding: 5px 15px; border-radius: 30px; border: 1px solid var(--border); flex: 1; margin: 0 15px;
        }
        .search-area input { border: none; background: transparent; margin: 0; padding: 5px; width: 100%; color: var(--neon-green); }

        /* FEED */
        .feed { padding: 20px; max-width: 600px; margin: 0 auto; }
        .post {
            background: var(--glass); border: 1px solid var(--border); border-radius: 15px;
            margin-bottom: 20px; padding: 15px; animation: slideUp 0.5s ease;
        }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-header img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--neon-green); }
        .post-img { width: 100%; border-radius: 10px; margin: 10px 0; border: 1px solid var(--border); }
        .post-actions { display: flex; gap: 20px; margin-top: 10px; color: var(--neon-green); }
        .post-actions div { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .tag-pill { font-size: 0.7rem; background: var(--neon-green); color: black; padding: 2px 8px; border-radius: 10px; margin-left: 5px; }

        /* MODAIS */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { background: #0a110a; border: 1px solid var(--neon-green); padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; max-height: 80vh; overflow-y: auto; }

        .comment-item { border-bottom: 1px solid var(--glass); padding: 10px 0; display: flex; gap: 10px; }
        .comment-item img { width: 25px; height: 25px; border-radius: 50%; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .rank-item { display: flex; align-items: center; gap: 15px; padding: 10px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <!-- SPLASH -->
    <div id="splash-screen">
        <div class="glitch-text">MEMES<br>BR<br>COMMUNITY</div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <div class="by-goat">By: Goat</div>
    </div>

    <!-- AUTH -->
    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="margin-bottom: 20px; color: var(--neon-green);">IDENTIFIQUE-SE</h2>
            <div class="profile-upload" onclick="document.getElementById('input-file').click()">
                <i data-lucide="camera" id="upload-icon"></i>
                <img id="preview-img" style="display:none">
            </div>
            <input type="file" id="input-file" hidden accept="image/*">
            <input type="text" id="username" placeholder="Nome de Usuário">
            <input type="password" id="password" placeholder="Senha">
            <button class="btn" id="btn-auth" onclick="handleAuth()">Registrar / Login</button>
        </div>
    </div>

    <!-- MAIN -->
    <div id="main-content">
        <header>
            <div onclick="openModal('post-modal')" style="cursor:pointer"><i data-lucide="plus-square"></i></div>
            <div class="search-area">
                <i data-lucide="search" size="18"></i>
                <input type="text" id="search-input" placeholder="Pesquisar..." oninput="renderPosts()">
                <i data-lucide="filter" id="filter-btn" size="18" onclick="toggleMemeFilter()" style="cursor:pointer; transition: 0.3s;"></i>
            </div>
            <div style="display:flex; gap: 15px; cursor:pointer">
                <i data-lucide="trophy" onclick="showRank()"></i>
                <i data-lucide="shield-check" onclick="openModal('admin-modal')"></i>
            </div>
        </header>
        <div class="feed" id="feed-container"></div>
    </div>

    <!-- MODAL POSTAR -->
    <div id="post-modal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
                <h3>Nova Postagem</h3>
                <i data-lucide="x" onclick="closeModal('post-modal')" style="cursor:pointer"></i>
            </div>
            <textarea id="post-text" placeholder="No que está pensando?" style="width:100%; height:80px; background:black; color:white; border:1px solid var(--border); padding:10px; border-radius:10px; outline:none;"></textarea>
            <input type="file" id="post-file">
            <select id="post-tag">
                <option value="geral">Geral</option>
                <option value="meme">Meme</option>
            </select>
            <button class="btn" onclick="createPost()">POSTAR</button>
        </div>
    </div>

    <!-- MODAL COMENTÁRIOS -->
    <div id="comment-modal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
                <h3>Comentários</h3>
                <i data-lucide="x" onclick="closeModal('comment-modal')" style="cursor:pointer"></i>
            </div>
            <div id="comments-list" style="margin-bottom: 15px;"></div>
            <div style="display:flex; gap: 10px;">
                <input type="text" id="new-comment" placeholder="Escreva um comentário..." style="margin:0;">
                <button class="btn" style="width:auto; margin:0;" onclick="addComment()">OK</button>
            </div>
        </div>
    </div>

    <!-- MODAL RANKING -->
    <div id="rank-modal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
                <h3>TOP 10 LENDAS</h3>
                <i data-lucide="x" onclick="closeModal('rank-modal')" style="cursor:pointer"></i>
            </div>
            <div id="rank-list"></div>
        </div>
    </div>

    <!-- MODAL ADMIN -->
    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <h3>PAINEL ADMIN</h3>
            <input type="password" id="admin-code" placeholder="Código: 2012">
            <button class="btn" onclick="checkAdmin()">ACESSAR</button>
            <div id="admin-tools" style="display:none; margin-top:20px;">
                <p style="color:red">MODO ADMIN ATIVO</p>
                <button class="btn" style="background: #333; color:white" onclick="logoutAdmin()">SAIR</button>
            </div>
            <button class="btn" onclick="closeModal('admin-modal')" style="margin-top:10px; background: transparent; color:gray;">Fechar</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyB5GzJ3Lms_xtd6_9Rru9Bjmc-nCnz4iHM",
            authDomain: "songokuue.firebaseapp.com",
            projectId: "songokuue",
            storageBucket: "songokuue.firebasestorage.app",
            messagingSenderId: "981357296896",
            appId: "1:981357296896:web:5f2bab8092d8e848ea07e5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // VARIÁVEIS DE ESTADO
        let users = [];
        let posts = [];
        let currentUser = null;
        let isAdmin = false;
        let memeFilter = false;
        let currentPostId = null;

        // INICIALIZAÇÃO
        window.onload = () => {
            lucide.createIcons();
            loadInitialData(); // Carregar dados do Firebase
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('auth-screen').style.display = 'flex';
                }, 500);
            }, 5000);
        };

        async function loadInitialData() {
            // Ouvinte em tempo real para Usuários
            db.collection("users").onSnapshot(snapshot => {
                users = snapshot.docs.map(doc => doc.data());
            });
            // Ouvinte em tempo real para Posts
            db.collection("posts").orderBy("id", "desc").onSnapshot(snapshot => {
                posts = snapshot.docs.map(doc => ({ firebaseId: doc.id, ...doc.data() }));
                renderPosts();
            });
        }

        // AUTH
        const usernameInput = document.getElementById('username');
        const previewImg = document.getElementById('preview-img');
        const uploadIcon = document.getElementById('upload-icon');

        usernameInput.oninput = (e) => {
            const user = users.find(u => u.name === e.target.value);
            if (user) {
                previewImg.src = user.pic;
                previewImg.style.display = 'block';
                uploadIcon.style.display = 'none';
            } else {
                previewImg.style.display = 'none';
                uploadIcon.style.display = 'block';
            }
        };

        document.getElementById('input-file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                previewImg.src = reader.result;
                previewImg.style.display = 'block';
                uploadIcon.style.display = 'none';
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        async function handleAuth() {
            const name = usernameInput.value;
            const pass = document.getElementById('password').value;
            const pic = previewImg.src;
            if (!name || !pass) return alert('Preencha os dados!');

            let user = users.find(u => u.name === name);
            if (user) {
                if (user.pass !== pass) return alert('Senha incorreta!');
                currentUser = user;
            } else {
                currentUser = { name, pass, pic, likesReceived: 0 };
                await db.collection("users").doc(name).set(currentUser);
            }
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        // POSTS
        async function createPost() {
            const text = document.getElementById('post-text').value;
            const tag = document.getElementById('post-tag').value;
            const file = document.getElementById('post-file').files[0];

            let imageData = null;
            if (file) {
                imageData = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            const newPost = {
                id: Date.now(),
                author: currentUser.name,
                authorPic: currentUser.pic,
                content: text,
                tag: tag,
                likes: 0,
                likedBy: [],
                comments: [],
                image: imageData
            };

            await db.collection("posts").add(newPost);
            closeModal('post-modal');
            document.getElementById('post-text').value = '';
            document.getElementById('post-file').value = '';
        }

        function renderPosts() {
            const container = document.getElementById('feed-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = '';

            let filtered = posts.filter(p => p.content.toLowerCase().includes(search));
            if (memeFilter) filtered = filtered.filter(p => p.tag === 'meme');

            filtered.forEach(post => {
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `
                    <div class="post-header">
                        <img src="${post.authorPic}">
                        <div style="flex:1">
                            <span style="font-weight:bold">${post.author}</span>
                            <span class="tag-pill">${post.tag}</span>
                        </div>
                        ${isAdmin ? `<i data-lucide="trash-2" onclick="deletePost('${post.firebaseId}')" style="color:red; cursor:pointer"></i>` : ''}
                    </div>
                    <p>${post.content}</p>
                    ${post.image ? `<img src="${post.image}" class="post-img">` : ''}
                    <div class="post-actions">
                        <div onclick="likePost('${post.firebaseId}')">
                            <i data-lucide="heart" style="${post.likedBy.includes(currentUser.name) ? 'fill:red; color:red' : ''}"></i>
                            <span>${post.likes}</span>
                        </div>
                        <div onclick="openComments('${post.firebaseId}')">
                            <i data-lucide="message-circle"></i>
                            <span>${post.comments.length}</span>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        // COMENTÁRIOS
        function openComments(firebaseId) {
            currentPostId = firebaseId;
            const post = posts.find(p => p.firebaseId === firebaseId);
            const list = document.getElementById('comments-list');
            list.innerHTML = post.comments.length ? '' : '<p style="color:gray">Ninguém comentou ainda...</p>';
            
            post.comments.forEach(c => {
                list.innerHTML += `
                    <div class="comment-item">
                        <img src="${c.pic}">
                        <div>
                            <p style="font-weight:bold; font-size:0.8rem; color:var(--neon-green)">${c.user}</p>
                            <p style="font-size:0.9rem">${c.text}</p>
                        </div>
                    </div>
                `;
            });
            openModal('comment-modal');
        }

        async function addComment() {
            const input = document.getElementById('new-comment');
            if (!input.value) return;
            const post = posts.find(p => p.firebaseId === currentPostId);
            const newComments = [...post.comments, {
                user: currentUser.name,
                pic: currentUser.pic,
                text: input.value
            }];
            await db.collection("posts").doc(currentPostId).update({ comments: newComments });
            input.value = '';
            openComments(currentPostId);
        }

        async function likePost(firebaseId) {
            const post = posts.find(p => p.firebaseId === firebaseId);
            let newLikes = post.likes;
            let newLikedBy = [...post.likedBy];

            if (newLikedBy.includes(currentUser.name)) {
                newLikedBy = newLikedBy.filter(u => u !== currentUser.name);
                newLikes--;
            } else {
                newLikedBy.push(currentUser.name);
                newLikes++;
            }

            await db.collection("posts").doc(firebaseId).update({
                likes: newLikes,
                likedBy: newLikedBy
            });
            
            // Atualizar likes totais do autor
            const authorRef = db.collection("users").doc(post.author);
            authorRef.get().then(doc => {
                if(doc.exists) {
                    let total = doc.data().likesReceived || 0;
                    authorRef.update({ likesReceived: post.likedBy.includes(currentUser.name) ? total - 1 : total + 1 });
                }
            });
        }

        function toggleMemeFilter() {
            memeFilter = !memeFilter;
            const btn = document.getElementById('filter-btn');
            btn.style.color = memeFilter ? "white" : "var(--neon-green)";
            btn.style.background = memeFilter ? "var(--neon-green)" : "transparent";
            btn.style.borderRadius = "50%";
            renderPosts();
        }

        function showRank() {
            const list = document.getElementById('rank-list');
            list.innerHTML = '';
            const topUsers = [...users].sort((a,b) => (b.likesReceived || 0) - (a.likesReceived || 0)).slice(0, 10);
            topUsers.forEach((u, i) => {
                list.innerHTML += `
                    <div class="rank-item">
                        <span style="color:var(--neon-green)">#${i+1}</span>
                        <img src="${u.pic}" style="width:30px; height:30px; border-radius:50%">
                        <span style="flex:1">${u.name}</span>
                        <span>${u.likesReceived || 0} likes</span>
                        ${isAdmin ? `<button onclick="banUser('${u.name}')" style="background:red; color:white; border:none; padding:2px 5px; border-radius:4px; font-size:10px; cursor:pointer">BAN</button>` : ''}
                    </div>
                `;
            });
            openModal('rank-modal');
        }

        function checkAdmin() {
            if (document.getElementById('admin-code').value === "2012") {
                isAdmin = true;
                document.getElementById('admin-tools').style.display = 'block';
                renderPosts();
                alert('Admin Ativado!');
            } else { alert('Código Errado!'); }
        }

        function logoutAdmin() { isAdmin = false; document.getElementById('admin-tools').style.display = 'none'; renderPosts(); }
        async function deletePost(fid) { await db.collection("posts").doc(fid).delete(); }
        async function banUser(name) {
            if(name === currentUser.name) return;
            await db.collection("users").doc(name).delete();
            // Opcional: deletar posts do banido
            const userPosts = posts.filter(p => p.author === name);
            userPosts.forEach(p => db.collection("posts").doc(p.firebaseId).delete());
            showRank();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
