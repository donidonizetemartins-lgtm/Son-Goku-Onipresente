<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade do Onipresente</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ssj4-red: #ff0000;
            --ssj4-dark-red: #8b0000;
            --ssj4-orange: #ff8c00; 
            --ssj4-gold: #ffd700;
            --ssj4-black: #0a0a0a;
            --ssj4-dark: #111;
            --glass: rgba(20, 20, 20, 0.9);
            --border-futuristic: 1px solid rgba(255, 0, 0, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background-color: var(--ssj4-black); color: white; overflow: hidden; height: 100vh; width: 100vw; display: flex; justify-content: center; }
        
        #mobile-container { width: 100%; max-width: 450px; height: 100vh; background: #000; position: relative; border-left: 1px solid var(--ssj4-red); border-right: 1px solid var(--ssj4-red); display: flex; flex-direction: column; }

        /* SPLASH SCREEN */
        #splash-screen { position: absolute; inset: 0; z-index: 100; background: black; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: transform 0.8s ease; }
        .ssj4-title { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--ssj4-red); text-shadow: 0 0 15px var(--ssj4-red); }
        .loader-bar { width: 0%; height: 6px; background: linear-gradient(90deg, var(--ssj4-red), var(--ssj4-gold)); animation: fillBar 5s forwards; }
        @keyframes fillBar { to { width: 100%; } }

        /* AUTH SCREEN */
        #auth-screen { padding: 20px; flex-direction: column; align-items: center; justify-content: center; flex: 1; display: none; }
        .profile-upload { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--ssj4-red); margin-bottom: 20px; overflow: hidden; }
        .profile-upload img { width: 100%; height: 100%; object-fit: cover; }
        .auth-input { width: 85%; padding: 12px; margin: 8px 0; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--ssj4-dark-red); border-radius: 5px; color: white; outline: none; }
        .btn-ssj4 { width: 85%; padding: 15px; background: var(--ssj4-red); border: none; color: white; font-weight: bold; cursor: pointer; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); }

        /* APP SCREEN - ESTRUTURA IGUAL A FOTO */
        #app-screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        
        .header { height: 40%; min-height: 40%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-bottom: 2px solid var(--ssj4-red); background: linear-gradient(to bottom, #1a0000, #000); }
        .top-icons { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #000; overflow: hidden; position: relative; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        /* BARRA DE MENSAGEM (O QUE TINHA SUMIDO) */
        .chat-input-bar { height: 60px; background: #0a0a0a; display: flex; align-items: center; gap: 10px; padding: 0 15px; border-top: 1px solid #222; }
        .msg-input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 20px; color: white; outline: none; }

        /* ESTILO DAS MENSAGENS IGUAL A FOTO */
        .message { background: #111; padding: 12px; border-radius: 10px; border-left: 4px solid var(--ssj4-gold); margin-bottom: 5px; }
        .msg-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .msg-name { color: var(--ssj4-gold); font-weight: bold; font-family: 'Orbitron'; font-size: 0.9rem; }
        .msg-avatar { width: 30px; height: 30px; border-radius: 50%; }

        /* PANELS */
        .futuristic-panel { position: absolute; bottom: -100%; left: 0; width: 100%; height: 70%; background: var(--glass); backdrop-filter: blur(10px); z-index: 60; border-top: 2px solid var(--ssj4-orange); padding: 20px; transition: 0.4s; }
        .futuristic-panel.active { bottom: 0; }
        
        .icon-btn { width: 40px; height: 40px; background: rgba(255,255,255,0.05); border: 1px solid var(--ssj4-orange); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ssj4-orange); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="mobile-container">
    <!-- SPLASH -->
    <div id="splash-screen">
        <h1 class="ssj4-title">SON GOKU</h1>
        <p style="color:var(--ssj4-gold); letter-spacing:5px;">O ONIPRESENTE</p>
        <div style="width:70%; height:6px; background:#222; margin:20px 0;"><div class="loader-bar"></div></div>
        <p style="font-size:0.8rem; color: #444;">By: Goat</p>
    </div>

    <!-- AUTH -->
    <div id="auth-screen">
        <h2 id="auth-title" style="color:var(--ssj4-gold); margin-bottom:20px;">REGISTRAR</h2>
        <div class="profile-upload" onclick="document.getElementById('file-input').click()">
            <img id="preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </div>
        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="previewImage(this)">
        <input type="text" id="user-name" class="auth-input" placeholder="Seu Nome">
        <input type="password" id="user-pass" class="auth-input" placeholder="Sua Senha">
        <button class="btn-ssj4" onclick="handleAuth()">ENTRAR NA COMUNIDADE</button>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app-screen">
        <div class="header">
            <div class="top-icons">
                <div class="icon-btn" onclick="openPanel('news-panel')">📄</div>
                <div class="icon-btn" onclick="openPanel('admin-panel')">👑</div>
            </div>
            <h2 style="color:var(--ssj4-red); font-family:'Orbitron';">COMUNIDADE</h2>
            <p style="color:var(--ssj4-gold); font-size: 0.8rem; letter-spacing: 3px;">DO ONIPRESENTE</p>
        </div>

        <div class="chat-area">
            <div id="chat-messages"></div>
            
            <!-- BARRA DE DIGITAÇÃO RECUPERADA -->
            <div class="chat-input-bar">
                <div onclick="document.getElementById('chat-file').click()" style="cursor:pointer; font-size:1.5rem;">🖼️</div>
                <input type="file" id="chat-file" class="hidden" accept="image/*" onchange="chatFileSelected()">
                <input type="text" id="chat-msg-input" class="msg-input" placeholder="Digite sua mensagem...">
                <div onclick="sendMessage()" style="cursor:pointer; font-size:1.5rem;">🔥</div>
            </div>
        </div>

        <!-- PAINÉIS (NOTÍCIAS/ADMIN) -->
        <div id="news-panel" class="futuristic-panel">
            <h3 style="color:var(--ssj4-gold)">NOTÍCIAS & ENQUETES</h3>
            <div id="news-list" style="margin-top:15px; overflow-y:auto; height:80%;"></div>
            <button class="btn-ssj4" style="width:100%; margin-top:10px;" onclick="closePanels()">FECHAR</button>
        </div>

        <div id="admin-panel" class="futuristic-panel">
            <h3 style="color:var(--ssj4-red)">PAINEL ADMIN</h3>
            <div id="admin-login-box">
                <input type="password" id="admin-pass" class="auth-input" style="width:100%" placeholder="Senha Admin">
                <button class="btn-ssj4" style="width:100%" onclick="checkAdmin()">LOGAR</button>
            </div>
            <div id="admin-tools" class="hidden">
                <input type="text" id="n-title" class="auth-input" style="width:100%" placeholder="Título Notícia">
                <textarea id="n-body" class="auth-input" style="width:100%; height:50px;" placeholder="Texto"></textarea>
                <button class="btn-ssj4" style="width:100%" onclick="sendNews()">POSTAR NOTÍCIA</button>
                <button class="btn-ssj4" style="width:100%; background:var(--ssj4-gold); color:black; margin-top:5px;" onclick="sendPoll()">CRIAR ENQUETE</button>
            </div>
            <button class="btn-ssj4" style="width:100%; background:#333; margin-top:10px;" onclick="closePanels()">VOLTAR</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

<script>
    // Configurações do Firebase
    const firebaseConfig = { apiKey: "A", authDomain: "A", projectId: "A", storageBucket: "A", messagingSenderId: "A", appId: "A" };
    let db;
    try { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); } catch(e) {}

    let user = null;
    let isAdmin = false;
    let tempImg = null;

    // Splash Timer
    setTimeout(() => { 
        document.getElementById('splash-screen').style.transform = 'translateY(-100%)'; 
        document.getElementById('auth-screen').style.display = 'flex';
    }, 5000);

    function previewImage(i) {
        if(i.files && i.files[0]) {
            let r = new FileReader();
            r.onload = e => document.getElementById('preview').src = e.target.result;
            r.readAsDataURL(i.files[0]);
        }
    }

    function handleAuth() {
        const n = document.getElementById('user-name').value;
        if(n.length < 2) return alert("Nome inválido");
        user = { name: n, img: document.getElementById('preview').src };
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        
        // Mensagem de Boas-vindas como na foto
        renderLocalMsg("SISTEMA", "https://cdn-icons-png.flaticon.com/512/9131/9131529.png", `Bem-vindo à comunidade do Onipresente, ${n}!`);
        
        if(db) { loadChat(); loadNews(); }
    }

    function renderLocalMsg(n, img, txt, file = null) {
        const box = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = 'message';
        let delBtn = isAdmin ? `<span onclick="deleteMsg('${file}')" style="color:red; font-size:0.7rem; margin-left:10px;">[APAGAR]</span>` : '';
        div.innerHTML = `
            <div class="msg-header">
                <img src="${img}" class="msg-avatar">
                <span class="msg-name">${n}</span>
                ${delBtn}
            </div>
            <div class="msg-body">${txt} ${file ? `<br><img src="${file}" style="max-width:100%; border-radius:5px; margin-top:10px;">` : ''}</div>
        `;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('chat-msg-input');
        if(!input.value && !tempImg) return;
        if(db) {
            db.collection("mensagens").add({
                name: user.name, img: user.img, text: input.value, file: tempImg, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        } else {
            renderLocalMsg(user.name, user.img, input.value, tempImg);
        }
        input.value = ""; tempImg = null;
    }

    function chatFileSelected() {
        const f = document.getElementById('chat-file').files[0];
        if(f) {
            let r = new FileReader();
            r.onload = e => { tempImg = e.target.result; alert("Imagem carregada! Clique no fogo para enviar."); };
            r.readAsDataURL(f);
        }
    }

    function loadChat() {
        db.collection("mensagens").orderBy("timestamp", "asc").onSnapshot(s => {
            document.getElementById('chat-messages').innerHTML = "";
            renderLocalMsg("SISTEMA", "https://cdn-icons-png.flaticon.com/512/9131/9131529.png", `Bem-vindo à comunidade do Onipresente, ${user.name}!`);
            s.forEach(doc => {
                const m = doc.data();
                renderLocalMsg(m.name, m.img, m.text, m.file);
            });
        });
    }

    function checkAdmin() {
        if(document.getElementById('admin-pass').value === "2012") {
            isAdmin = true;
            document.getElementById('admin-login-box').classList.add('hidden');
            document.getElementById('admin-tools').classList.remove('hidden');
        }
    }

    function openPanel(id) { closePanels(); document.getElementById(id).classList.add('active'); }
    function closePanels() { document.getElementById('news-panel').classList.remove('active'); document.getElementById('admin-panel').classList.remove('active'); }

    function sendNews() {
        const t = document.getElementById('n-title').value;
        const b = document.getElementById('n-body').value;
        if(db) db.collection("noticias").add({ title: t, body: b, type: 'news', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        closePanels();
    }

    function sendPoll() {
        const t = document.getElementById('n-title').value;
        if(db) db.collection("noticias").add({ title: t, type: 'poll', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        closePanels();
    }

    function loadNews() {
        db.collection("noticias").orderBy("timestamp", "desc").onSnapshot(s => {
            const list = document.getElementById('news-list');
            list.innerHTML = "";
            s.forEach(doc => {
                const n = doc.data();
                const d = document.createElement('div');
                d.style.background = "rgba(255,255,255,0.05)";
                d.style.padding = "10px";
                d.style.marginBottom = "10px";
                d.style.borderLeft = "3px solid red";
                d.innerHTML = n.type === 'poll' ? `<h4 style="color:gold">ENQUETE: ${n.title}</h4><button style="width:45%">SIM</button> <button style="width:45%">NÃO</button>` : `<h4>${n.title}</h4><p>${n.body}</p>`;
                list.appendChild(d);
            });
        });
    }
</script>
</body>
</html>
